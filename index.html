<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Pro - YouTube Thumbnail Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
        }
        body {
            background: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin: 20px 0;
            background: linear-gradient(90deg, #9d50bb, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: #0f0f0f;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 30px;
            margin: 20px 0;
        }
        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #e91e63, #880e4f);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        img {
            max-width: 100%;
            border-radius: 12px;
            margin: 15px 0;
        }
        .hidden {
            display: none;
        }
        .admin-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 11px;
            color: #333;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Thumbnail Pro</h1>
        <p>Get 4K & HD YouTube thumbnails instantly</p>
        
        <div class="card">
            <input type="text" id="videoUrl" placeholder="Paste YouTube URL here...">
            <button onclick="getThumbnail()">Extract Thumbnail 🔍</button>
        </div>
        
        <div class="card hidden" id="result">
            <img id="thumbnail" src="" alt="Thumbnail">
            <button onclick="downloadThumbnail()">Download HD ⬇️</button>
        </div>
    </div>
    <a href="#" class="admin-link" onclick="checkAdmin()">🔒</a>

    <script>
        function getVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([^&]+)/,
                /(?:youtu\.be\/)([^?]+)/,
                /(?:youtube\.com\/embed\/)([^/?]+)/
            ];
            for(let pattern of patterns) {
                const match = url.match(pattern);
                if(match) return match[1];
            }
            return null;
        }

        function getThumbnail() {
            const url = document.getElementById('videoUrl').value;
            const videoId = getVideoId(url);
            
            if(videoId) {
                const img = document.getElementById('thumbnail');
                img.src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                img.onerror = () => { img.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`; };
                document.getElementById('result').classList.remove('hidden');
            } else {
                alert('Please enter a valid YouTube URL');
            }
        }

        function downloadThumbnail() {
            window.open(document.getElementById('thumbnail').src, '_blank');
        }

        // ADMIN PANEL - Type /admin in URL
        if(window.location.pathname.includes('/admin') || window.location.hash.includes('admin')) {
            const id = prompt('Admin ID:');
            const pass = prompt('Password:');
            if(id === 'Ashish@2007' && pass === 'Ashish@2025') {
                localStorage.setItem('adminAds', prompt('Paste ad code for top banner:', ''));
                alert('Admin panel activated! Ad code saved.');
                location.href = location.pathname;
            } else {
                alert('Access Denied!');
            }
        }

        function checkAdmin() {
            if(window.location.pathname.includes('/admin')) return;
            window.location.href = '/admin';
        }

        // Load saved ads
        const savedAd = localStorage.getItem('adminAds');
        if(savedAd && savedAd.trim()) {
            const adDiv = document.createElement('div');
            adDiv.innerHTML = savedAd;
            adDiv.style.cssText = 'width:100%; text-align:center; margin:10px 0;';
            document.body.insertBefore(adDiv, document.body.firstChild);
        }
    </script>
</body>
</html>
