<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Pro - YouTube Thumbnail Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --border-color: #222;
            --accent-gradient: linear-gradient(90deg, #9d50bb 0%, #ff00cc 100%);
            --btn-gradient: linear-gradient(135deg, #e91e63 0%, #880e4f 100%);
            --text-main: #ffffff;
            --text-dim: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Header / Navbar */
        nav {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 40px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.4rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .nav-links a {
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #fff; }

        .pro-badge {
            border: 1px solid #ff00cc;
            color: #ff00cc;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .feature-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            border: 1px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-dim);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Main Card Layout */
        .card {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: block;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-container {
            flex: 1;
            position: relative;
            min-width: 250px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 16px 20px 16px 45px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 0.95rem;
        }

        .link-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.4;
        }

        .btn-extract {
            background: var(--btn-gradient);
            color: #fff;
            border: none;
            padding: 0 30px;
            height: 54px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(233, 30, 99, 0.2);
        }

        .btn-extract:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Result Section */
        #resultArea {
            display: none;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumb-container {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .thumb-container img {
            width: 100%;
            display: block;
        }

        .btn-save {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            color: #e91e63;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover {
            background: rgba(255,255,255,0.1);
            border-color: #e91e63;
        }

        @media (max-width: 600px) {
            .nav-links { display: none; }
            .input-wrapper { flex-direction: column; }
            .btn-extract { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M23 12l-2.44-2.78.34-3.68-3.61-.82-1.89-3.18L12 3 8.6 1.54 6.71 4.72l-3.61.81.34 3.68L1 12l2.44 2.78-.34 3.69 3.61.82 1.89 3.18L12 21l3.4 1.46 1.89-3.18 3.61-.82-.34-3.68L23 12zm-13 5l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            </div>
            Thumbnail <span style="color: #ff00cc; font-weight: 400;">Pro</span>
        </div>
        <div class="nav-links">
            <a href="#">How it works</a>
            <a href="#">API</a>
            <span class="pro-badge">v2.0 PRO</span>
        </div>
    </nav>

    <div class="hero">
        <div class="feature-tag">
            <span style="color: #ff00cc;">✦</span> Premium YouTube Extraction Tool
        </div>
        <h1>Download Content<br><span class="gradient-text">Like a Pro</span></h1>
        <p>Get 4K & HD thumbnails instantly. No ads, no compression, just pure pixels.</p>
    </div>

    <div class="card">
        <span class="label">VIDEO SOURCE</span>
        <div class="input-wrapper">
            <div class="input-container">
                <svg class="link-icon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                <input type="text" id="videoUrl" placeholder="Paste YouTube URL (e.g. https://youtu.be/...)">
            </div>
            <button class="btn-extract" onclick="generateThumbnail()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                EXTRACT
            </button>
        </div>
    </div>

    <div class="card" id="resultArea">
        <span class="label">EXTRACTED THUMBNAIL</span>
        <div class="thumb-container">
            <img id="thumbPreview" src="" alt="Preview">
        </div>
        <button class="btn-save" onclick="downloadImage()">Save HD Thumbnail</button>
    </div>

    <script>
        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        function generateThumbnail() {
            const urlInput = document.getElementById('videoUrl').value;
            const videoId = extractVideoID(urlInput);
            const resultArea = document.getElementById('resultArea');
            const thumbPreview = document.getElementById('thumbPreview');

            if (videoId) {
                // High resolution link
                const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                thumbPreview.src = thumbnailUrl;
                resultArea.style.display = 'block';

                // Fallback if maxres is not available
                thumbPreview.onerror = function() {
                    this.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                    this.onerror = null;
                };

                // Scroll to result on mobile
                setTimeout(() => {
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            } else {
                alert("Please enter a valid YouTube URL.");
            }
        }

        function downloadImage() {
            const imageUrl = document.getElementById('thumbPreview').src;
            window.open(imageUrl, '_blank');
        }

        // Enter key support
        document.getElementById("videoUrl").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                generateThumbnail();
            }
        });
    </script>
</body>
</html>
